<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoVJ</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    canvas { display: block; }
    #start-screen {
      position: fixed; inset: 0; z-index: 100;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #000;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      color: #fff;
    }
    #start-screen h1 {
      font-size: 72px; font-weight: 200; letter-spacing: 12px;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #ff006e, #8338ec, #3a86ff);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    #start-screen p { font-size: 14px; color: #666; margin-bottom: 40px; letter-spacing: 2px; }
    #start-btn, #folder-btn {
      padding: 16px 48px; font-size: 16px; letter-spacing: 4px;
      background: transparent; color: #fff; border: 1px solid #333;
      cursor: pointer; transition: all 0.3s;
      font-family: inherit; text-transform: uppercase;
    }
    #start-btn:hover { border-color: #ff006e; color: #ff006e; }
    #folder-btn {
      margin-top: 16px; font-size: 12px; padding: 10px 32px;
      color: #666; letter-spacing: 2px;
    }
    #folder-btn:hover { border-color: #3a86ff; color: #3a86ff; }
    #folder-status {
      margin-top: 12px; font-size: 11px; color: #555;
      letter-spacing: 1px; min-height: 16px;
    }
    #start-screen .hint {
      position: absolute; bottom: 30px;
      font-size: 11px; color: #444; letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div id="start-screen">
    <h1>AutoVJ</h1>
    <p>AUDIO-REACTIVE VISUAL ENGINE</p>
    <button id="start-btn">Start</button>
    <button id="folder-btn">Add Lyrics & Covers Folder</button>
    <div id="folder-status"></div>
    <div class="hint">1: Cover Art &bull; 2: Word Cloud &bull; F: fullscreen &bull; `: debug</div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
